<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Optimized - Full Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        button { padding: 10px 20px; background: blue; color: white; border: none; border-radius: 5px; margin: 5px; cursor: pointer; }
        #animatedBox { width: 50px; height: 50px; background: red; margin-top: 20px; position: relative; }
    </style>
</head>
<body>
    <h1>Product Gallery</h1>
    <button id="loadBtn">Load Products</button>
    <button id="animateBtn">Animate Box</button>
    <div id="productList"></div>
    <div id="animatedBox"></div>

    <script>
        function loadProductsGood() {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < 200; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>Product ${i}</h3>
                    <p>Description for product ${i}</p >
                    < img src="https://picsum.photos/200/150?random=${i}" loading="lazy">
                `;
                fragment.appendChild(card);
            }
            
            container.appendChild(fragment);
        }

        let position = 0;
        let animating = false;
        
        function animateGood() {
            if (!animating) return;
            
            const box = document.getElementById('animatedBox');
            
            position += 5;
            box.style.transform = `translateX(${position}px)`;
            
            if (position < 500) {
                requestAnimationFrame(animateGood);
            } else {
                animating = false;
                position = 0;
                box.style.transform = 'translateX(0px)';
            }
        }

        let resizeTimeout;
        window.addEventListener('resize', () => {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                console.log('Resize handler ran - optimized');
            }, 150);
        });

        document.getElementById('loadBtn').addEventListener('click', loadProductsGood);
        document.getElementById('animateBtn').addEventListener('click', () => {
            if (animating) return;
            animating = true;
            animateGood();
        });
    </script>
</body>
</html>
